name: Publish to TestPyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/codex-workspaces
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Check release ref matches package version
        shell: bash
        run: |
          package_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          ref_version=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ref_version="${GITHUB_REF_NAME#v}"
          elif [[ "$GITHUB_REF" == refs/heads/release/v* ]]; then
            ref_version="${GITHUB_REF_NAME#release/v}"
          fi

          if [ -z "$ref_version" ]; then
            echo "No release version encoded in ref ${GITHUB_REF}; package version is ${package_version}."
            exit 0
          fi

          if [ "$package_version" != "$ref_version" ]; then
            echo "Release ref version ${ref_version} does not match pyproject.toml version ${package_version}."
            exit 1
          fi
          echo "Release ref version matches package version: ${package_version}"

      - name: Build distributions
        run: python -m build

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
